name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild:
        description: 'Force a full rebuild of the cygnet databases (ignore cache)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Bump this string to force a cache miss and rebuild the databases.
  CACHE_VERSION: v2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute wordnet cache key
        id: wn-key
        run: |
          BASE="${{ env.CACHE_VERSION }}-${{ hashFiles('etc/wordnets.toml', 'etc/wnja-2.0.xml.xz', 'etc/open_slovene_wordnet_1.1.xml.xz') }}"
          if [[ "${{ inputs.rebuild }}" == "true" ]]; then
            echo "key=${BASE}-rebuild-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "key=${BASE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache cygnet databases
        id: cache-db
        uses: actions/cache@v4
        with:
          path: docs/cygnet/*.db.gz
          key: cygnet-db-${{ steps.wn-key.outputs.key }}

      - name: Clone cygnet toolchain
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/omwn/cygnet.git ../cygnet

      - name: Install system dependencies
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: sudo apt-get install -y curl tar xz-utils wget xmlstarlet libxml2-utils

      - name: Install uv
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build cygnet databases
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: bash cygnet/build.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
